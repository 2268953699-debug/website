ding:9px;border-radius:14px;border:1px solid var(--line);background:#fff;text-align:center;cursor:pointer;font-weight:950}.mood.on{background:var(--hot);color:#fff;border-color:var(--hot)}

  .home-cats span{width:42px;height:42px;display:grid;place-items:center;border-radius:16px;background:#fff;border:1px solid #ffd4e5;box-shadow:0 8px 18px rgba(233,92,153,.12)}
  .home-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0 14px;position:relative;z-index:1}
  .home-profile{display:flex;gap:10px;align-items:center;padding:13px;border-radius:22px;border:1px solid #ffd1e3;background:rgba(255,255,255,.82);box-shadow:0 10px 22px rgba(233,92,153,.10)}
  .home-profile b{display:block;color:#8d2959}
  .home-profile span{display:block;font-size:12px;color:#9b6480;margin-top:2px}
  .home-avatar{width:48px;height:48px;border-radius:18px;background:linear-gradient(160deg,#fff,#ffe4f0);display:grid;place-items:center;border:2px solid #ffc5dc;overflow:hidden;font-size:22px}
  .home-avatar.blue{background:linear-gradient(160deg,#fff,#eaf6ff)}
  .home-avatar img{width:100%;height:100%;object-fit:cover}
  .home-main-card{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:20px;border-radius:28px;background:linear-gradient(135deg,#ff8ab8,#ffb5cf 58%,#ffdbe9);color:white;box-shadow:0 18px 35px rgba(233,92,153,.28);position:relative;z-index:1;overflow:hidden}
  .home-main-card:before{content:'🎀';position:absolute;font-size:74px;right:102px;bottom:-24px;opacity:.18;transform:rotate(-18deg)}
  .small-label{font-size:13px;opacity:.92;font-weight:900}
  .home-streak{font-size:54px;font-weight:1000;letter-spacing:-.05em;line-height:1;margin:6px 0}
  .home-streak em{font-size:18px;font-style:normal;margin-left:6px}
  .home-sub{font-size:13px;opacity:.94;max-width:260px}
  .home-ring{width:126px;height:126px;position:relative;flex:0 0 auto}
  .home-ring svg{width:126px;height:126px;transform:rotate(-90deg)}
  .home-ring circle{fill:none;stroke-width:10;stroke:rgba(255,255,255,.32)}
  .home-ring circle+circle{stroke:#fff;stroke-linecap:round;stroke-dasharray:314;stroke-dashoffset:314;transition:.35s}
  .home-ring div{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .home-ring b{font-size:24px}
  .home-ring span{font-size:11px;font-weight:900;opacity:.9}
  .home-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0;position:relative;z-index:1}
  .home-actions button{
    border:1px solid #ffd3e4;
    background:#fff;
    border-radius:20px;
    padding:12px 8px;
    font-weight:900;
    color:#a43d72;
    box-shadow:0 8px 18px rgba(233,92,153,.10);
    cursor:pointer;
  }
  .home-task-board{display:grid;grid-template-columns:1fr 1fr;gap:12px;position:relative;z-index:1}
  .task-card{padding:14px;border-radius:22px;background:rgba(255,255,255,.86);border:1px solid #ffd3e4;box-shadow:0 8px 18px rgba(233,92,153,.09)}
  .task-card h3{margin:0 0 10px;color:#8d2959;font-size:16px}
  .task-list{display:grid;gap:8px}
  .task-row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px;color:#8b5772}
  .task-row b{color:#8d2959}
  .task-dot{width:24px;height:24px;display:grid;place-items:center;border-radius:50%;font-size:13px;background:#ffe2ef}
  .task-dot.ok{background:#e8ffd8}
  .task-dot.wait{background:#fff0d8}
  .app-tabbar{
    position:fixed;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    z-index:50;
    display:flex;
    gap:4px;
    padding:8px;
    border-radius:24px;
    background:rgba(255,255,255,.86);
    border:1px solid #ffd3e4;
    box-shadow:0 14px 35px rgba(160,55,110,.20);
    backdrop-filter:blur(16px);
  }
  .app-tabbar button{
    border:0;
    background:transparent;
    color:#a33e73;
    font-size:12px;
    font-weight:900;
    padding:7px 11px;
    border-radius:16px;
    cursor:pointer;
  }
  .app-tabbar button:hover{background:#fff0f7}
  .app-tabbar span{display:block;font-size:17px;line-height:1.1}
  .footer{padding-bottom:86px}
  @media (max-width: 720px){
    .phone-shell{padding:16px;border-radius:28px}
    .home-topbar h2{font-size:24px}
    .home-summary-grid,.home-task-board{grid-template-columns:1fr}
    .home-main-card{padding:16px;border-radius:24px}
    .home-streak{font-size:46px}
    .home-ring,.home-ring svg{width:104px;height:104px}
    .home-actions{grid-template-columns:1fr 1fr}
    .app-tabbar{left:10px;right:10px;bottom:10px;transform:none;justify-content:space-around}
    .app-tabbar button{padding:7px 8px}
  }


  /* ===== Responsive width fix: phone + desktop ===== */
  *, *::before, *::after { box-sizing: border-box; }

function yuan(n){return '¥'+Number(n||0).toFixed(2).replace(/\.00$/,'')}
function minToText(mins){mins=Math.max(0,Math.round(mins||0));let h=Math.floor(mins/60),m=mins%60;return h+'h '+String(m).padStart(2,'0')+'m'}
function toast(msg){let t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function defaultDay(){return{studyMinutes:0,studySessions:[],habits:{},meals:{breakfast:{text:'',photo:''},lunch:{text:'',photo:''},dinner:{text:'',photo:''}},mood:'',diary:'',message:'',review:{best:'',hard:'',adjust:'',encourage:''},expenseChecked:false,expenses:[]}}
function habitDefaults(h={}){let x={...h};x.repeatType=x.repeatType||'daily';x.repeatEvery=Number(x.repeatEvery||1);if(!x.repeatEvery||x.repeatEvery<1)x.repeatEvery=1;x.createdAt=x.createdAt||todayKey();return x}
function defaultState(){return{version:5,targetMinutes:240,createdAt:new Date().toISOString(),habits:[
  habitDefaults({id:uid(),person:'luming',title:'早睡',type:'睡眠',active:true,repeatType:'daily',repeatEvery:1,createdAt:todayKey()}),
  habitDefaults({id:uid(),person:'jiawen',title:'喝水',type:'健康',active:true,repeatType:'interval',repeatEvery:2,createdAt:todayKey()}),
  habitDefaults({id:uid(),person:'both',title:'拉伸',type:'健身',active:true,repeatType:'weekly',repeatEvery:1,createdAt:todayKey()})
],budgets:{luming:3000,jiawen:3000},avatars:{luming:'',jiawen:''},photos:[],days:{luming:{},jiawen:{}},rewards:[]}}
function migrate(s){
  s.version=s.version||1;s.targetMinutes=s.targetMinutes||240;s.habits=(s.habits||[]).map(habitDefaults);s.budgets=s.budgets||{luming:3000,jiawen:3000};s.avatars=s.avatars||{luming:'',jiawen:''};s.photos=Array.isArray(s.photos)?s.photos:[];s.days=s.days||{luming:{},jiawen:{}};s.rewards=s.rewards||[];
  for(const p of Object.keys(USERS)){s.days[p]=s.days[p]||{};for(const k of Object.keys(s.days[p])){s.days[p][k]=normalizeDay(s.days[p][k]);}}
  return s;
}
function normalizeDay(d){let x={...defaultDay(),...(d||{})};x.meals={...defaultDay().meals,...(d?.meals||{})};for(const [k] of MEALS){x.meals[k]={text:'',photo:'',...(x.meals[k]||{})};delete x.meals[k].comments;delete x.meals[k].rating;}x.review={...defaultDay().review,...(d?.review||{})};x.expenses=Array.isArray(x.expenses)?x.expenses:[];x.expenseChecked=!!x.expenseChecked;return x}
function loadLocal(){try{let x=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');return x?migrate(x):null}catch(e){return null}}
function saveLocal(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
async function saveState(){saveLocal();render();if(cloudReady&&!ignoreRemote){await cloud.from('buddy_rooms').upsert({room_id:roomId,data:state,updated_at:new Date().toISOString()})}}
function day(person,date=todayKey()){state.days[person]=state.days[person]||{};state.days[person][date]=normalizeDay(state.days[person][date]);return state.days[person][date]}
function setViewer(v){viewer=v;localStorage.setItem('buddyViewer',v);render()}
function setSyncStatus(type,msg){let dot=document.getElementById('syncDot');dot.className='dot-live '+(type||'');document.getElementById('syncText').textContent=msg}
async function connectCloud(){let url=document.getElementById('supabaseUrl').value.trim(),key=document.getElementById('supabaseKey').value.trim();roomId=document.getElementById('roomId').value.trim()||'luming-jiawen';localStorage.setItem('buddyCloudCfg',JSON.stringify({url,key,roomId}));if(!url||!key)return toast('请填写 Supabase URL 和 key');cloud=window.supabase.createClient(url,key);setSyncStatus('', '连接中');let {data,error}=await cloud.from('buddy_rooms').select('data').eq('room_id',roomId).maybeSingle();if(error){setSyncStatus('bad','连接失败');return toast(error.message)}if(data?.data){state=migrate(data.data);saveLocal()}else{await cloud.from('buddy_rooms').insert({room_id:roomId,data:state})}cloudReady=true;setSyncStatus('ok','已连接：'+roomId);subscribeRoom();render();toast('同步成功')}
async function manualCloudLoad(){if(!cloudReady)return toast('还没有连接同步');let {data,error}=await cloud.from('buddy_rooms').select('data').eq('room_id',roomId).maybeSingle();if(error)return toast(error.message);if(data?.data){state=migrate(data.data);saveLocal();render();toast('已刷新')}}
function subscribeRoom(){if(channel)cloud.removeChannel(channel);channel=cloud.channel('buddy_room_'+roomId).on('postgres_changes',{event:'UPDATE',schema:'public',table:'buddy_rooms',filter:'room_id=eq.'+roomId},payload=>{if(payload.new?.data){ignoreRemote=true;state=migrate(payload.new.data);saveLocal();render();ignoreRemote=false;setSyncStatus('ok','已同步')}}).subscribe()}
function showSql(){const sql=`create table if not exists public.buddy_rooms (\n  room_id text primary key,\n  data jsonb not null default '{}'::jsonb,\n  updated_at timestamptz not null default now()\n);\n\nalter table public.buddy_rooms enable row level security;\n\ndrop policy if exists "Allow anonymous read by room" on public.buddy_rooms;\ndrop policy if exists "Allow anonymous upsert by room" on public.buddy_rooms;\ndrop policy if exists "Allow anonymous update by room" on public.buddy_rooms;\n\ncreate policy "Allow anonymous read by room" on public.buddy_rooms for select to anon using (true);\ncreate policy "Allow anonymous upsert by room" on public.buddy_rooms for insert to anon with check (true);\ncreate policy "Allow anonymous update by room" on public.buddy_rooms for update to anon using (true) with check (true);`;document.getElementById('sqlBox').textContent=sql;document.getElementById('sqlPanel').classList.toggle('hide')}
function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='buddy-backup-'+todayKey()+'.json';a.click()}
function resetLocal(){if(confirm('只清空本机浏览器数据，不会自动删除云端房间。确定？')){localStorage.removeItem(STORAGE_KEY);state=defaultState();saveLocal();render();toast('已清空本机')}}

function studyLiveMinutes(person){let t=timers[person];return day(person).studyMinutes+(t?Math.floor((Date.now()-t.start)/60000):0)}
function startTimer(person){if(viewer!==person)return toast('请先切换到本人再编辑');if(timers[person])return toast('计时中');timers[person]={start:Date.now()};render()}
function pauseTimer(person){if(viewer!==person)return toast('请先切换到本人再编辑');let t=timers[person];if(!t)return toast('没有正在计时');let mins=Math.max(1,Math.floor((Date.now()-t.start)/60000));let d=day(person);d.studyMinutes+=mins;d.studySessions.push({id:uid(),minutes:mins,at:new Date().toISOString()});delete timers[person];saveState();toast('已保存 '+minToText(mins))}
function addStudy(person){if(viewer!==person)return toast('请先切换到本人再编辑');let mins=Number(prompt('补录学习分钟数：','60')||0);if(mins>0){let d=day(person);d.studyMinutes+=mins;d.studySessions.push({id:uid(),minutes:mins,manual:true,at:new Date().toISOString()});saveState()}}
function resetTodayStudy(person){if(viewer!==person)return toast('请先切换到本人再编辑');if(confirm('清空今天学习记录？')){let d=day(person);d.studyMinutes=0;d.studySessions=[];saveState()}}
function updateTarget(){let v=Number(document.getElementById('targetHours')?.value||4);state.targetMinutes=Math.max(1,Math.round(v*60));saveState()}
function studyDone(person,date){return day(person,date).studyMinutes>=state.targetMinutes}

function activeHabits(person){return state.habits.map(habitDefaults).filter(h=>h.active&&(h.person===person||h.person==='both'))}
function addHabit(person){
  if(viewer!==person)return toast('请先切换到本人再编辑');
  let title=document.getElementById('habitTitle_'+person).value.trim();let type=document.getElementById('habitType_'+person).value;
  let repeatType=document.getElementById('habitRepeat_'+person).value;let repeatEvery=Number(document.getElementById('habitRepeatNum_'+person).value||1);
  if(!title)return toast('请输入习惯名称');
  state.habits.push(habitDefaults({id:uid(),person,title,type,active:true,repeatType,repeatEvery,createdAt:todayKey()}));
  document.getElementById('habitTitle_'+person).value='';saveState()
}
function habitFreqLabel(h){h=habitDefaults(h);if(h.repeatType==='interval')return `每 ${h.repeatEvery} 天 1 次`;if(h.repeatType==='weekly')return `每周 ${h.repeatEvery} 次`;return '每天'}
function dateDiff(a,b){return Math.floor((new Date(a+'T00:00:00')-new Date(b+'T00:00:00'))/86400000)}
function weekStartKey(date=todayKey()){let d=new Date(date+'T00:00:00');let idx=(d.getDay()+6)%7;d.setDate(d.getDate()-idx);return todayKey(d)}
function weekDatesOf(date=todayKey()){let start=new Date(weekStartKey(date)+'T00:00:00');return Array.from({length:7},(_,i)=>{let d=new Date(start);d.setDate(start.getDate()+i);return d})}
function habitScheduledOn(h,date=todayKey()){h=habitDefaults(h);if(date<h.createdAt)return false;if(h.repeatType==='daily')return true;if(h.repeatType==='interval'){let diff=dateDiff(date,h.createdAt);return diff>=0 && diff%h.repeatEvery===0}return true}
function habitWeekCount(person,hid,date=todayKey()){return weekDatesOf(date).filter(dt=>!!day(person,todayKey(dt)).habits[hid]).length}
function habitCompleteForDate(person,h,date=todayKey()){h=habitDefaults(h);if(!habitScheduledOn(h,date))return true;if(h.repeatType==='weekly')return habitWeekCount(person,h.id,date)>=h.repeatEvery;return !!day(person,date).habits[h.id]}
function toggleHabit(person,hid,date=todayKey()){if(viewer!==person)return toast('请先切换到本人再编辑');let d=day(person,date);d.habits[hid]=!d.habits[hid];saveState()}
function editHabit(hid){let h=state.habits.find(x=>x.id===hid);if(!h)return;let title=prompt('修改习惯名称：',h.title);if(title!==null&&title.trim())h.title=title.trim();let freq=prompt('设置频率：输入 1=每天，2=每N天，3=每周N次',h.repeatType==='interval'?'2':h.repeatType==='weekly'?'3':'1');if(freq){h.repeatType=freq==='2'?'interval':freq==='3'?'weekly':'daily';let n=prompt(h.repeatType==='weekly'?'每周几次？':'每几天一次？',h.repeatEvery||1);h.repeatEvery=Math.max(1,Number(n||1));}saveState()}
function pauseHabit(hid){let h=state.habits.find(x=>x.id===hid);if(h){h.active=false;saveState()}}
function delHabit(hid){if(confirm('删除这个习惯？')){state.habits=state.habits.filter(h=>h.id!==hid);saveState()}}
function dateAdd(date,delta){let d=new Date(date+'T00:00:00');d.setDate(d.getDate()+delta);return todayKey(d)}
function lastScheduledDate(h,date=todayKey()){h=habitDefaults(h);let cur=date;if(h.repeatType==='daily')return cur;if(h.repeatType==='weekly')return weekStartKey(cur);while(cur>=h.createdAt&&!habitScheduledOn(h,cur))cur=dateAdd(cur,-1);return cur>=h.createdAt?cur:null}
function habitStreak(person,hid){let h=state.habits.find(x=>x.id===hid);if(!h)return 0;h=habitDefaults(h);let n=0;if(h.repeatType==='weekly'){let cur=weekStartKey(todayKey());while(cur>=weekStartKey(h.createdAt)&&habitWeekCount(person,hid,cur)>=h.repeatEvery){n++;cur=dateAdd(cur,-7)}return n}let cur=lastScheduledDate(h,todayKey());while(cur&&cur>=h.createdAt&&day(person,cur).habits[hid]){n++;cur=dateAdd(cur,-(h.repeatType==='interval'?h.repeatEvery:1))}return n}
function habitLongest(person,hid){let h=state.habits.find(x=>x.id===hid);if(!h)return 0;h=habitDefaults(h);let best=0,cur=0;if(h.repeatType==='weekly'){let first=weekStartKey(h.createdAt),now=weekStartKey(todayKey());for(let dt=first;dt<=now;dt=dateAdd(dt,7)){if(habitWeekCount(person,hid,dt)>=h.repeatEvery){cur++;best=Math.max(best,cur)}else cur=0}return best}let dt=lastScheduledDate(h,todayKey());let dates=[];while(dt&&dt>=h.createdAt){dates.unshift(dt);dt=dateAdd(dt,-(h.repeatType==='interval'?h.repeatEvery:1))}for(const d0 of dates){if(day(person,d0).habits[hid]){cur++;best=Math.max(best,cur)}else cur=0}return best}
function weekDates(){return weekDatesOf(todayKey())}
function habitsDone(person,date){let hs=activeHabits(person);if(!hs.length)return false;let scheduled=hs.filter(h=>habitScheduledOn(h,date));if(!scheduled.length)return true;return scheduled.every(h=>habitCompleteForDate(person,h,date))}

function updateMeal(person,k,field,val){if(viewer!==person)return;day(person).meals[k][field]=val;saveState()}
async function updateMealPhoto(person,k,input){if(viewer!==person)return toast('请先切换到本人再编辑');let file=input.files?.[0];if(!file)return;let data=await resizeImageFile(file,960,.86);day(person).meals[k].photo=data;saveState();toast('已保存'+(MEALS.find(x=>x[0]===k)?.[1]||'')+'照片')}
function clearMealPhoto(person,k){if(viewer!==person)return toast('请先切换到本人再编辑');day(person).meals[k].photo='';saveState()}
function mealsDone(person,date){return MEALS.every(([k])=>day(person,date).meals[k].text.trim())}
function setMood(person,m){if(viewer!==person)return toast('请先切换到本人再编辑');day(person).mood=m;saveState()}
function updateText(person,field,val){if(viewer!==person)return;day(person)[field]=val;saveState()}
function moodDone(person,date){let d=day(person,date);return !!(d.mood||d.diary.trim()||d.message.trim())}
function updateReview(person,field,val){if(viewer!==person)return;day(person).review[field]=val;saveState()}
function reviewDone(person,date=todayKey()){let r=day(person,date).review;return !!(r.best.trim()||r.hard.trim()||r.adjust.trim()||r.encourage.trim())}

function monthKeyDate(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function monthExpense(person,dateObj=viewMonth){let y=dateObj.getFullYear(),m=dateObj.getMonth();let total=0,byCat={};for(const date of Object.keys(state.days[person]||{})){let dd=new Date(date+'T00:00:00');if(dd.getFullYear()===y&&dd.getMonth()===m){for(const e of day(person,date).expenses||[]){total+=Number(e.amount||0);byCat[e.cat]=(byCat[e.cat]||0)+Number(e.amount||0)}}}return{total,byCat}}
function todayExpense(person,date=todayKey()){return (day(person,date).expenses||[]).reduce((s,e)=>s+Number(e.amount||0),0)}
function addExpense(person){if(viewer!==person)return toast('请先切换到本人再编辑');let amount=Number(document.getElementById('expenseAmount_'+person).value||0);let cat=document.getElementById('expenseCat_'+person).value;let note=document.getElementById('expenseNote_'+person).value.trim();if(amount<=0)return toast('请输入花销金额');let d=day(person);d.expenses.push({id:uid(),amount,cat,note,at:new Date().toISOString()});d.expenseChecked=true;document.getElementById('expenseAmount_'+person).value='';document.getElementById('expenseNote_'+person).value='';saveState()}
function noExpense(person){if(viewer!==person)return toast('请先切换到本人再编辑');day(person).expenseChecked=true;saveState();toast('已记录今日无花销')}
function deleteExpense(person,id,date=todayKey()){if(viewer!==person)return toast('请先切换到本人再编辑');let d=day(person,date);d.expenses=d.expenses.filter(e=>e.id!==id);saveState()}
function updateBudget(person,val){if(viewer!==person)return;state.budgets[person]=Math.max(0,Number(val||0));saveState()}
function expenseDone(person,date){let d=day(person,date);return d.expenseChecked || (d.expenses||[]).length>0}

function moduleStatus(person,date=todayKey()){return{study:studyDone(person,date),habits:habitsDone(person,date),meals:mealsDone(person,date),mood:moodDone(person,date),review:reviewDone(person,date),expense:expenseDone(person,date)}}
function moduleCount(person,date=todayKey()){let s=moduleStatus(person,date);return Object.values(s).filter(Boolean).length}
function statusLine(person,date=todayKey()){let s=moduleStatus(person,date);let map={study:'学习',habits:'习惯',meals:'三餐',mood:'心情',review:'复盘',expense:'花销'};return Object.keys(map).map(k=>`${map[k]}${s[k]?'✅':'❌'}`).join(' ｜ ')}
function complete(person,date,mode){let s=moduleStatus(person,date);if(mode==='composite')return Object.values(s).every(Boolean);return !!s[mode]}
function bothComplete(date,mode){return complete('luming',date,mode)&&complete('jiawen',date,mode)}
function currentStreak(mode){let n=0,cur=todayKey();while(bothComplete(cur,mode)){n++;cur=dateAdd(cur,-1)}return n}

function addReward(){let title=document.getElementById('rewardTitle').value.trim();let days=Number(document.getElementById('rewardDays').value||0);let basis=document.getElementById('rewardBasis').value;let luming=document.getElementById('rewardLuming').value.trim();let jiawen=document.getElementById('rewardJiawen').value.trim();if(!title||!days)return toast('请填写奖励内容和连续天数');state.rewards.push({id:uid(),title,days,basis,notes:{luming,jiawen},claimed:false,createdAt:new Date().toISOString()});['rewardTitle','rewardDays','rewardLuming','rewardJiawen'].forEach(id=>document.getElementById(id).value='');saveState()}
function toggleReward(id){let r=state.rewards.find(x=>x.id===id);if(r){r.claimed=!r.claimed;saveState()}}
function deleteReward(id){if(confirm('删除这个奖励？')){state.rewards=state.rewards.filter(r=>r.id!==id);saveState()}}
function basisName(b){return MODES.find(x=>x[0]===b)?.[1]||b}


let pendingPhotoData='';
function resizeImageFile(file,max=1000,quality=.86){return new Promise((resolve,reject)=>{if(!file)return resolve('');let r=new FileReader();r.onload=()=>{let img=new Image();img.onload=()=>{let w=img.width,h=img.height,scale=Math.min(1,max/Math.max(w,h));let c=document.createElement('canvas');c.width=Math.round(w*scale);c.height=Math.round(h*scale);let ctx=c.getContext('2d');ctx.drawImage(img,0,0,c.width,c.height);resolve(c.toDataURL('image/jpeg',quality))};img.onerror=reject;img.src=r.result};r.onerror=reject;r.readAsDataURL(file)})}
async function updateAvatar(person,input){if(viewer!==person)return toast('请先切换到本人再编辑');let file=input.files?.[0];if(!file)return;let data=await resizeImageFile(file,360,.9);state.avatars[person]=data;saveState();toast('头像已更新')}
async function prepareSharedPhoto(file){if(!file)return;pendingPhotoData=await resizeImageFile(file,1100,.86);toast('照片已选择，写一句话后发布')}
function addSharedPhoto(){let caption=document.getElementById('photoCaption').value.trim();if(!pendingPhotoData)return toast('请先选择照片');state.photos.unshift({id:uid(),person:viewer,img:pendingPhotoData,caption,createdAt:new Date().toISOString(),date:todayKey()});pendingPhotoData='';document.getElementById('photoFile').value='';document.getElementById('photoCaption').value='';saveState();toast('已发布照片')}
function deleteSharedPhoto(id){let ph=state.photos.find(x=>x.id===id);if(!ph)return;if(ph.person!==viewer)return toast('只能删除自己发的照片');state.photos=state.photos.filter(x=>x.id!==id);saveState()}
function renderPhotos(){let grid=document.getElementById('photoGrid');if(!grid)return;let html=(state.photos||[]).length?(state.photos||[]).slice(0,24).map(ph=>`<div class="photo-card ${ph.person===viewer?'mine':''}"><button class="btn small warn delete-photo" onclick="deleteSharedPhoto('${ph.id}')">删</button><img src="${ph.img}" alt="分享照片"><div class="photo-caption">${esc(ph.caption||'')}</div><div class="photo-owner"><span>${USERS[ph.person]?.name||''}</span><span>${(ph.createdAt||'').slice(0,10)}</span></div></div>`).join(''):'<div class="muted">还没有分享照片</div>';grid.innerHTML=html}

function renderKpis(){const ds=todayKey();let l=moduleCount('luming',ds),j=moduleCount('jiawen',ds);let html=[
  ['双人学习连续',currentStreak('study')+' 天',''],
  ['双人综合连续',currentStreak('composite')+' 天',''],
  ['陈麓名今日',l+'/6 项',statusLine('luming',ds)],
  ['许佳雯今日',j+'/6 项',statusLine('jiawen',ds)]
].map(([a,b,c])=>`<div class="kpi"><div class="num">${b}</div><div class="lbl">${a}</div>${c?`<div class="statusline">${c}</div>`:''}</div>`).join('');document.getElementById('kpis').innerHTML=html}
function renderPerson(person){let u=USERS[person],d=day(person),readonly=viewer!==person;let mins=studyLiveMinutes(person),pct=Math.min(100,mins/state.targetMinutes*100);let hs=activeHabits(person);
let mealHtml=MEALS.map(([k,label])=>{let m=d.meals[k];let hasPhoto=!!m.photo;return `<div class="meal meal-card"><div class="meal-top"><b>${label}</b><span class="tag">${m.text.trim()||hasPhoto?'已记录':'待记录'}</span></div><textarea ${readonly?'disabled':''} placeholder="今天吃了什么？" oninput="updateMeal('${person}','${k}','text',this.value)">${esc(m.text)}</textarea><div class="meal-actions ${readonly?'readonly':''}"><label class="camera-pill">📷 拍照<input ${readonly?'disabled':''} type="file" accept="image/*" capture="environment" style="display:none" onchange="updateMealPhoto('${person}','${k}',this)"></label>${hasPhoto?`<button class="btn small ghost ${readonly?'readonly-hide':''}" onclick="clearMealPhoto('${person}','${k}')">删除照片</button>`:''}</div>${hasPhoto?`<img class="meal-preview" src="${m.photo}" alt="${label}照片">`:''}</div>`}).join('');
let habitHtml=hs.length?hs.map(h=>{h=habitDefaults(h);let todayScheduled=habitScheduledOn(h,todayKey());let checked=h.repeatType==='weekly'?habitCompleteForDate(person,h,todayKey()):!!d.habits[h.id];let week=weekDates().map(dt=>{let key=todayKey(dt),done=!!day(person,key).habits[h.id],due=habitScheduledOn(h,key);return `<div title="${due?'应完成':'非打卡日'}" class="daychip ${done?'done':''} ${due?'':'soft'}" onclick="toggleHabit('${person}','${h.id}','${key}')">${dt.getDate()}</div>`}).join('');let currentInfo=h.repeatType==='weekly'?`本周 ${habitWeekCount(person,h.id)}/${h.repeatEvery}`:(todayScheduled?(checked?'今日完成':'今日待完成'):'今天不用打');return `<div class="habit cute-block"><div class="habit-top"><label class="switch"><input ${readonly?'disabled':''} type="checkbox" ${checked?'checked':''} ${todayScheduled?'':'disabled'} onchange="toggleHabit('${person}','${h.id}')">${esc(h.title)}</label><span class="tag">${currentInfo}</span></div><div class="habit-meta"><span class="due">周期：${habitFreqLabel(h)}</span><span class="due ${habitStreak(person,h.id)>0?'ok':'wait'}">连续 ${habitStreak(person,h.id)} 次</span><span class="due">最长 ${habitLongest(person,h.id)} 次</span></div><div class="week">${week}</div><div class="row edit-only" style="margin-top:8px"><button class="btn small secondary" onclick="editHabit('${h.id}')">修改</button><button class="btn small ghost" onclick="pauseHabit('${h.id}')">暂停</button><button class="btn small warn" onclick="delHabit('${h.id}')">删除</button></div></div>`}).join(''):'<div class="muted">还没有习惯</div>';
let moodHtml=MOODS.map(m=>`<button class="mood ${d.mood===m?'on':''}" ${readonly?'disabled':''} onclick="setMood('${person}','${m}')">${m}</button>`).join('');
let month=monthExpense(person,viewMonth),budget=Number(state.budgets[person]||0),left=budget-month.total;let catMax=Math.max(1,...Object.values(month.byCat));let catHtml=EXPENSE_CATS.filter(c=>month.byCat[c]).map(c=>`<div class="catbar"><b><span>${c}</span><span>${yuan(month.byCat[c])}</span></b><div class="mini-progress"><span style="width:${Math.min(100,month.byCat[c]/catMax*100)}%"></span></div></div>`).join('')||'<div class="muted">本月还没有分类花销</div>';
let expList=(d.expenses||[]).length?(d.expenses||[]).map(e=>`<div class="expense-item"><div><b>${esc(e.cat)}</b><div class="tiny">${esc(e.note||'无备注')}</div></div><div class="row"><span class="expense-amount">${yuan(e.amount)}</span><button class="btn small warn edit-only" onclick="deleteExpense('${person}','${e.id}')">删</button></div></div>`).join(''):'<div class="muted">今天还没有花销记录</div>';
let avatar=state.avatars?.[person]?`<div class="avatar-wrap"><img class="avatar-img" src="${state.avatars[person]}" alt="${u.name}头像"><label class="avatar-change edit-only">换头像<input type="file" accept="image/*" capture="user" style="display:none" onchange="updateAvatar('${person}',this)"></label></div>`:`<div class="avatar-wrap"><div class="cat ${u.cat}"><span class="bow"><span></span></span><span class="eye l"></span><span class="eye r"></span><span class="nose"></span><span class="whisker w1"></span><span class="whisker w2"></span></div><label class="avatar-change edit-only">换头像<input type="file" accept="image/*" capture="user" style="display:none" onchange="updateAvatar('${person}',this)"></label></div>`;
return `<div class="panel person ${u.glow} ${readonly?'readonly':''}"><div class="decor-sparkle">♡ 🎀 🍓 ✦ ☁️</div><div class="person-head"><div class="namebox">${avatar}<div><h2>${u.name}</h2><div class="muted">${moduleCount(person)}/6 项｜${statusLine(person)}</div></div></div><span class="tag status-pill ${complete(person,todayKey(),'composite')?'done':'doing'}">${complete(person,todayKey(),'composite')?'今日完成':'进行中'}</span></div>
  <div class="module fancy-module"><span class="sticker2">📚</span><div class="module-title"><h3>学习计时</h3><span class="tag">目标 <input id="targetHours" class="input" type="number" step="0.5" value="${state.targetMinutes/60}" onchange="updateTarget()" style="width:76px;display:inline;padding:5px 7px"> h</span></div><div class="timer-big">${minToText(mins)}</div><div class="progress candy"><div class="bar" style="width:${pct}%"></div></div><div class="row edit-only" style="margin-top:10px"><button class="btn small" onclick="startTimer('${person}')">开始</button><button class="btn small secondary" onclick="pauseTimer('${person}')">暂停/保存</button><button class="btn small ghost" onclick="addStudy('${person}')">补录</button><button class="btn small warn" onclick="resetTodayStudy('${person}')">清空今日</button></div></div>
  <div class="module fancy-module"><span class="sticker2">🌱</span><div class="module-title"><h3>习惯养成</h3><span class="tag">${hs.filter(h=>habitCompleteForDate(person,h,todayKey())).length}/${hs.length}</span></div><div class="two edit-only"><input id="habitTitle_${person}" class="input" placeholder="新习惯"><select id="habitType_${person}"><option>学习</option><option>健身</option><option>睡眠</option><option>饮食</option><option>工作</option><option>生活</option><option>其他</option></select></div><div class="freq-grid edit-only"><select id="habitRepeat_${person}"><option value="daily">每天</option><option value="interval">每 N 天</option><option value="weekly">每周 N 次</option></select><input id="habitRepeatNum_${person}" class="input" type="number" min="1" value="1" placeholder="N"><button class="btn small" onclick="addHabit('${person}')">添加</button></div><div class="checklist" style="margin-top:10px">${habitHtml}</div></div>
  <div class="module fancy-module"><span class="sticker2">🍱</span><div class="module-title"><h3>一日三餐</h3><span class="tag">${MEALS.filter(([k])=>d.meals[k].text.trim()||d.meals[k].photo).length}/3</span></div><div class="checklist">${mealHtml}</div></div>
  <div class="module fancy-module"><span class="sticker2">💗</span><div class="module-title"><h3>心情日记</h3><span class="tag">${d.mood||'未选'}</span></div><div class="mood-list">${moodHtml}</div><textarea ${readonly?'disabled':''} placeholder="今天的心情" oninput="updateText('${person}','diary',this.value)">${esc(d.diary)}</textarea><textarea ${readonly?'disabled':''} placeholder="今天想对对方说的话" oninput="updateText('${person}','message',this.value)">${esc(d.message)}</textarea></div>
  <div class="module fancy-module"><span class="sticker2">📝</span><div class="module-title"><h3>每日复盘</h3><span class="tag">${reviewDone(person)?'已写':'未写'}</span></div><textarea ${readonly?'disabled':''} placeholder="今天完成得最好的一件事" oninput="updateReview('${person}','best',this.value)">${esc(d.review.best)}</textarea><textarea ${readonly?'disabled':''} placeholder="今天哪个目标最难坚持" oninput="updateReview('${person}','hard',this.value)">${esc(d.review.hard)}</textarea><textarea ${readonly?'disabled':''} placeholder="明天要调整什么" oninput="updateReview('${person}','adjust',this.value)">${esc(d.review.adjust)}</textarea><textarea ${readonly?'disabled':''} placeholder="对搭子说一句鼓励的话" oninput="updateReview('${person}','encourage',this.value)">${esc(d.review.encourage)}</textarea></div>
  <div class="module fancy-module"><span class="sticker2">💰</span><div class="module-title"><h3>花销记录</h3><span class="tag">本月 ${yuan(month.total)}</span></div><div class="two"><div class="field"><label>月花销目标</label><input ${readonly?'disabled':''} class="input" type="number" value="${budget}" onchange="updateBudget('${person}',this.value)"></div><div class="field"><label>剩余额度</label><div class="input ${left>=0?'money-ok':'money-bad'}" style="font-weight:1000">${left>=0?yuan(left):'超出 '+yuan(Math.abs(left))}</div></div></div><div class="three edit-only" style="margin-top:9px"><input id="expenseAmount_${person}" class="input" type="number" placeholder="金额"><select id="expenseCat_${person}">${EXPENSE_CATS.map(c=>`<option>${c}</option>`).join('')}</select><input id="expenseNote_${person}" class="input" placeholder="备注"></div><div class="row edit-only" style="margin-top:9px"><button class="btn small" onclick="addExpense('${person}')">记录花销</button><button class="btn small secondary" onclick="noExpense('${person}')">今日无花销</button></div><div class="expense-list">${expList}</div><div class="catgrid">${catHtml}</div></div>
</div>`}
function renderCompare(){document.getElementById('compare').innerHTML=renderPerson('luming')+renderPerson('jiawen')}
function renderTabs(){document.getElementById('calendarTabs').innerHTML=MODES.map(([k,n])=>`<button class="tab ${calendarMode===k?'on':''}" onclick="calendarMode='${k}';renderCalendar()">${n}</button>`).join('')}
function shiftMonth(n){viewMonth.setMonth(viewMonth.getMonth()+n);renderCalendar();renderCompare()}
function renderCalendar(){renderTabs();const y=viewMonth.getFullYear(),m=viewMonth.getMonth();document.getElementById('monthTitle').textContent=`${y} 年 ${m+1} 月`;let first=new Date(y,m,1),start=(first.getDay()+6)%7,days=new Date(y,m+1,0).getDate();let html=['一','二','三','四','五','六','日'].map(w=>`<div class="weekday">${w}</div>`).join('');for(let i=0;i<start;i++)html+='<div></div>';for(let d=1;d<=days;d++){let date=monthKeyDate(y,m,d);let l=complete('luming',date,calendarMode),j=complete('jiawen',date,calendarMode);let cls=l&&j?'both':l?'left':j?'right':'none';let isToday=date===todayKey();html+=`<div class="datecell ${isToday?'today':''}" onclick="showDay('${date}')"><div class="num">${d}</div><div class="tiny">${moduleCount('luming',date)}/6 · ${moduleCount('jiawen',date)}/6</div><div class="mark ${cls}"></div></div>`}document.getElementById('calendar').innerHTML=html}
function personSummary(person,date){let d=day(person,date);let hs=activeHabits(person);let meals=MEALS.map(([k,n])=>`${n}：${d.meals[k].text||'未记录'}${d.meals[k].photo?' ｜ 已拍照':''}`).join('\n');let exps=(d.expenses||[]).length?(d.expenses||[]).map(e=>`${e.cat} ${yuan(e.amount)} ${e.note||''}`).join('\n'):(d.expenseChecked?'今日无花销':'未记录');return `${USERS[person].name}\n${statusLine(person,date)}\n学习：${minToText(d.studyMinutes)} / ${minToText(state.targetMinutes)}\n习惯：${hs.filter(h=>day(person,date).habits[h.id]).length}/${hs.length}\n三餐：\n${meals}\n心情：${d.mood||'未记录'}\n日记：${d.diary||'未写'}\n想对对方说：${d.message||'未写'}\n复盘：\n- 最好：${d.review.best||'未写'}\n- 最难：${d.review.hard||'未写'}\n- 调整：${d.review.adjust||'未写'}\n- 鼓励：${d.review.encourage||'未写'}\n花销：\n${exps}`}
function showDay(date){document.getElementById('dayDetail').textContent=`${date} 完整记录\n\n${personSummary('luming',date)}\n\n-----------------------------\n\n${personSummary('jiawen',date)}`}
function renderRewards(){let html=state.rewards.length?state.rewards.map(r=>{let cur=currentStreak(r.basis),pct=Math.min(100,cur/r.days*100);return `<div class="reward"><div class="big">${esc(r.title)}</div><div class="tiny">双人${basisName(r.basis)}连续｜目标 ${r.days} 天</div><div class="progress" style="margin:10px 0"><div class="bar" style="width:${pct}%"></div></div><b>${cur}/${r.days} 天</b><div class="note-card"><b>陈麓名：</b>${esc(r.notes?.luming||'')}</div><div class="note-card"><b>许佳雯：</b>${esc(r.notes?.jiawen||'')}</div><div class="row" style="margin-top:8px"><button class="btn small secondary" onclick="toggleReward('${r.id}')">${r.claimed?'取消领取':'标记领取'}</button><button class="btn small warn" onclick="deleteReward('${r.id}')">删除</button></div></div>`}).join(''):'<div class="muted">还没有共同奖励</div>';document.getElementById('rewards').innerHTML=html}

function scrollToSection(id){let el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'})}
function moduleIcon(done){return `<span class="task-dot ${done?'ok':'wait'}">${done?'✓':'·'}</span>`}
function nextRewardText(){let list=(state.rewards||[]).filter(r=>!r.claimed&&r.days>0);if(!list.length)return '设置一个共同奖励，让连续打卡更有期待';let sorted=list.map(r=>({r,cur:currentStreak(r.basis),left:Math.max(0,r.days-currentStreak(r.basis))})).sort((a,b)=>a.left-b.left);let item=sorted[0];return item.left===0?`已达成：${item.r.title}`:`距离「${item.r.title}」还差 ${item.left} 天`}
function renderHome(){
  let ds=todayKey();
  let l=moduleStatus('luming',ds),j=moduleStatus('jiawen',ds);
  let lc=moduleCount('luming',ds),jc=moduleCount('jiawen',ds);
  let bothDone=Object.keys(l).filter(k=>l[k]&&j[k]).length;
  let pct=Math.round((bothDone/6)*100);
  let ring=document.getElementById('homeRingProgress');
  if(ring){ring.style.strokeDashoffset=String(314-(314*pct/100))}
  let avL=document.getElementById('homeAvatarLuming'), avJ=document.getElementById('homeAvatarJiawen');
  if(avL)avL.innerHTML=state.avatars?.luming?`<img src="${state.avatars.luming}" alt="陈麓名头像">`:'🐱';
  if(avJ)avJ.innerHTML=state.avatars?.jiawen?`<img src="${state.avatars.jiawen}" alt="许佳雯头像">`:'🐱';
  let el;
  if(el=document.getElementById('homeLumingStatus'))el.textContent=`${lc}/6 项完成`;
  if(el=document.getElementById('homeJiawenStatus'))el.textContent=`${jc}/6 项完成`;
  if(el=document.getElementById('homeCompositeStreak'))el.textContent=currentStreak('composite');
  if(el=document.getElementById('homeBothPercent'))el.textContent=pct+'%';
  if(el=document.getElementById('homeNextReward'))el.textContent=nextRewardText();

  const labels=[['study','学习'],['habits','习惯'],['meals','三餐'],['mood','心情'],['review','复盘'],['expense','花销']];
  let card=(name,s)=>`<div class="task-card"><h3>${name} 今日清单</h3><div class="task-list">${labels.map(([k,n])=>`<div class="task-row"><b>${n}</b>${moduleIcon(s[k])}</div>`).join('')}</div></div>`;
  let board=document.getElementById('homeTaskBoard');
  if(board)board.innerHTML=card('陈麓名',l)+card('许佳雯',j);
}

function render(){document.getElementById('viewer').value=viewer;renderHome();renderKpis();renderCompare();renderPhotos();renderCalendar();renderRewards()}

(function init(){let cfg=JSON.parse(localStorage.getItem('buddyCloudCfg')||'{}');if(cfg.url)document.getElementById('supabaseUrl').value=cfg.url;if(cfg.key)document.getElementById('supabaseKey').value=cfg.key;if(cfg.roomId)document.getElementById('roomId').value=cfg.roomId;roomId=cfg.roomId||roomId;render();setInterval(()=>{let changed=false;for(const p of Object.keys(timers)){if(timers[p])changed=true}if(changed)render()},30000)})();
</script>
</body>
</html>
